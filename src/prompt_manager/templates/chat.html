{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 700px;">
  <h2>LLM Chat</h2>
  <div id="chat-history" class="border rounded p-3 mb-3 bg-light" style="height: 400px; overflow-y: auto;">
    <!-- Chat messages will be rendered here -->
  </div>
  <form id="chat-form" autocomplete="off">
    <div class="input-group">
      <input type="text" class="form-control" id="chat-input" placeholder="Type your message..." autocomplete="off">
      <button class="btn btn-primary" type="submit">Send</button>
    </div>
  </form>
</div>
<script>
  // Chat history in sessionStorage
  function getHistory() {
    return JSON.parse(sessionStorage.getItem('chatHistory') || '[]');
  }
  function setHistory(history) {
    sessionStorage.setItem('chatHistory', JSON.stringify(history));
  }
  function renderHistory() {
    const history = getHistory();
    const chatDiv = document.getElementById('chat-history');
    chatDiv.innerHTML = '';
    for (const msg of history) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'mb-2';
      if (msg.role === 'user') {
        msgDiv.innerHTML = `<div class='fw-bold text-primary'>You:</div><div>${msg.content}</div>`;
      } else {
        msgDiv.innerHTML = `<div class='fw-bold text-success'>LLM:</div><div>${msg.content}</div>`;
      }
      chatDiv.appendChild(msgDiv);
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }
  renderHistory();

  document.getElementById('chat-form').onsubmit = async function(e) {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    let history = getHistory();
    history.push({ role: 'user', content: text });
    setHistory(history);
    renderHistory();
    input.value = '';
    // Send to backend
    const resp = await fetch('/api/llm/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: text })
    });
    const data = await resp.json();
    if (resp.ok && data.response) {
      history = getHistory();
      history.push({ role: 'llm', content: data.response });
      setHistory(history);
      renderHistory();
    } else {
      history = getHistory();
      history.push({ role: 'llm', content: '[Error: ' + (data.error || 'Unknown error') + ']' });
      setHistory(history);
      renderHistory();
    }
  };
</script>
{% endblock %}
