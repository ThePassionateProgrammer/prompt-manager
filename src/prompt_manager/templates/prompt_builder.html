{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Prompt Builder</h2>
    <p class="text-muted">Build custom prompts by selecting different pieces and combining them.</p>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Prompt Pieces</h5>
                </div>
                <div class="card-body">
                    <form id="prompt-builder-form">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="role-category" class="form-label">Role Category</label>
                                <select class="form-select" id="role-category">
                                    <option value="">Select Category...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="role" class="form-label">Role</label>
                                <select class="form-select" id="role" disabled>
                                    <option value="">Select Role...</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="context-category" class="form-label">Context Category</label>
                                <select class="form-select" id="context-category">
                                    <option value="">Select Category...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="context" class="form-label">Context</label>
                                <select class="form-select" id="context" disabled>
                                    <option value="">Select Context...</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="voice" class="form-label">Voice/Tone</label>
                                <select class="form-select" id="voice">
                                    <option value="">Select Voice...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="audience" class="form-label">Audience</label>
                                <select class="form-select" id="audience">
                                    <option value="">Select Audience...</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="format" class="form-label">Format</label>
                                <select class="form-select" id="format">
                                    <option value="">Select Format...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="custom-text" class="form-label">Custom Text (Optional)</label>
                                <textarea class="form-control" id="custom-text" rows="2" placeholder="Add any additional instructions..."></textarea>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-primary" id="build-prompt">
                                <i class="fas fa-magic me-1"></i>Build Prompt
                            </button>
                            <button type="button" class="btn btn-secondary" id="clear-form">
                                <i class="fas fa-eraser me-1"></i>Clear
                            </button>
                            <button type="button" class="btn btn-success" id="send-to-chat" disabled>
                                <i class="fas fa-comment-dots me-1"></i>Send to Chat
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Generated Prompt</h5>
                </div>
                <div class="card-body">
                    <div id="prompt-preview" class="border rounded p-3 bg-light" style="min-height: 200px;">
                        <p class="text-muted text-center">Your generated prompt will appear here...</p>
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-outline-primary btn-sm" id="copy-prompt" disabled>
                            <i class="fas fa-copy me-1"></i>Copy to Clipboard
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let promptPieces = {};

// Load prompt pieces on page load
document.addEventListener('DOMContentLoaded', function() {
    loadPromptPieces();
    setupEventListeners();
});

function loadPromptPieces() {
    fetch('/api/prompt-builder/pieces')
        .then(response => response.json())
        .then(data => {
            promptPieces = data;
            populateDropdowns();
        })
        .catch(error => {
            console.error('Error loading prompt pieces:', error);
            showAlert('Error loading prompt pieces', 'error');
        });
}

function populateDropdowns() {
    // Populate role categories
    const roleCategorySelect = document.getElementById('role-category');
    roleCategorySelect.innerHTML = '<option value="">Select Category...</option>';
    Object.keys(promptPieces.roles).forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category.charAt(0).toUpperCase() + category.slice(1);
        roleCategorySelect.appendChild(option);
    });
    
    // Populate context categories
    const contextCategorySelect = document.getElementById('context-category');
    contextCategorySelect.innerHTML = '<option value="">Select Category...</option>';
    Object.keys(promptPieces.contexts).forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category.charAt(0).toUpperCase() + category.slice(1);
        contextCategorySelect.appendChild(option);
    });
    
    // Populate voices
    const voiceSelect = document.getElementById('voice');
    voiceSelect.innerHTML = '<option value="">Select Voice...</option>';
    Object.keys(promptPieces.voices).forEach(voice => {
        const option = document.createElement('option');
        option.value = voice;
        option.textContent = voice.charAt(0).toUpperCase() + voice.slice(1);
        voiceSelect.appendChild(option);
    });
    
    // Populate audiences
    const audienceSelect = document.getElementById('audience');
    audienceSelect.innerHTML = '<option value="">Select Audience...</option>';
    Object.keys(promptPieces.audiences).forEach(audience => {
        const option = document.createElement('option');
        option.value = audience;
        option.textContent = audience.charAt(0).toUpperCase() + audience.slice(1);
        audienceSelect.appendChild(option);
    });
    
    // Populate formats
    const formatSelect = document.getElementById('format');
    formatSelect.innerHTML = '<option value="">Select Format...</option>';
    Object.keys(promptPieces.formats).forEach(format => {
        const option = document.createElement('option');
        option.value = format;
        option.textContent = format.charAt(0).toUpperCase() + format.slice(1);
        formatSelect.appendChild(option);
    });
}

function setupEventListeners() {
    // Role category change
    document.getElementById('role-category').addEventListener('change', function() {
        const roleSelect = document.getElementById('role');
        const category = this.value;
        
        roleSelect.innerHTML = '<option value="">Select Role...</option>';
        roleSelect.disabled = !category;
        
        if (category && promptPieces.roles[category]) {
            Object.keys(promptPieces.roles[category]).forEach(role => {
                const option = document.createElement('option');
                option.value = role;
                option.textContent = role.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                roleSelect.appendChild(option);
            });
        }
    });
    
    // Context category change
    document.getElementById('context-category').addEventListener('change', function() {
        const contextSelect = document.getElementById('context');
        const category = this.value;
        
        contextSelect.innerHTML = '<option value="">Select Context...</option>';
        contextSelect.disabled = !category;
        
        if (category && promptPieces.contexts[category]) {
            Object.keys(promptPieces.contexts[category]).forEach(context => {
                const option = document.createElement('option');
                option.value = context;
                option.textContent = context.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                contextSelect.appendChild(option);
            });
        }
    });
    
    // Build prompt button
    document.getElementById('build-prompt').addEventListener('click', buildPrompt);
    
    // Clear form button
    document.getElementById('clear-form').addEventListener('click', clearForm);
    
    // Copy prompt button
    document.getElementById('copy-prompt').addEventListener('click', copyPrompt);
    
    // Send to chat button
    document.getElementById('send-to-chat').addEventListener('click', sendToChat);
}

function buildPrompt() {
    const formData = {
        role_category: document.getElementById('role-category').value,
        role: document.getElementById('role').value,
        context_category: document.getElementById('context-category').value,
        context: document.getElementById('context').value,
        voice: document.getElementById('voice').value,
        audience: document.getElementById('audience').value,
        format_type: document.getElementById('format').value,
        custom_text: document.getElementById('custom-text').value
    };
    
    fetch('/api/prompt-builder/build', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            showAlert('Error building prompt: ' + data.error, 'error');
        } else {
            displayPrompt(data.prompt);
        }
    })
    .catch(error => {
        console.error('Error building prompt:', error);
        showAlert('Error building prompt', 'error');
    });
}

function displayPrompt(prompt) {
    const preview = document.getElementById('prompt-preview');
    if (prompt) {
        preview.innerHTML = `<pre class="mb-0">${prompt}</pre>`;
        document.getElementById('copy-prompt').disabled = false;
        document.getElementById('send-to-chat').disabled = false;
    } else {
        preview.innerHTML = '<p class="text-muted text-center">No prompt generated. Please select some pieces.</p>';
        document.getElementById('copy-prompt').disabled = true;
        document.getElementById('send-to-chat').disabled = true;
    }
}

function clearForm() {
    document.getElementById('prompt-builder-form').reset();
    document.getElementById('role').disabled = true;
    document.getElementById('context').disabled = true;
    document.getElementById('prompt-preview').innerHTML = '<p class="text-muted text-center">Your generated prompt will appear here...</p>';
    document.getElementById('copy-prompt').disabled = true;
    document.getElementById('send-to-chat').disabled = true;
}

function copyPrompt() {
    const preview = document.getElementById('prompt-preview');
    const promptText = preview.textContent;
    
    navigator.clipboard.writeText(promptText).then(() => {
        showAlert('Prompt copied to clipboard!', 'success');
    }).catch(() => {
        showAlert('Failed to copy prompt', 'error');
    });
}

function sendToChat() {
    const preview = document.getElementById('prompt-preview');
    const promptText = preview.textContent;
    
    // Store the prompt in sessionStorage for the chat page
    sessionStorage.setItem('promptToInject', promptText);
    
    // Redirect to chat page
    window.location.href = '/chat?inject=' + encodeURIComponent(promptText);
}

function showAlert(message, type) {
    // Simple alert - you can enhance this with a proper notification system
    alert(message);
}
</script>
{% endblock %}
